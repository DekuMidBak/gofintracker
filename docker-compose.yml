services:
  api-gateway:
    build:
      context: .
      dockerfile: docker/api-gateway.Dockerfile
    container_name: gofintracker-api-gateway
    environment:
      API_GATEWAY_HTTP_ADDR: :8080
      HTTP_SHUTDOWN_TIMEOUT: 10s
      API_GATEWAY_USER_SERVICE_GRPC_ADDR: user-service:50051
      API_GATEWAY_TRANSACTION_SERVICE_GRPC_ADDR: transaction-service:50052
      API_GATEWAY_ANALYTICS_SERVICE_GRPC_ADDR: analytics-service:50053
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "8080:8080"
    depends_on:
      user-service:
        condition: service_started
      transaction-service:
        condition: service_started
      analytics-service:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: gofintracker-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gofintracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gofintracker}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: .
      dockerfile: docker/user-service.Dockerfile
    container_name: gofintracker-user-service
    environment:
      USER_SERVICE_GRPC_ADDR: :50051
      USERS_DATABASE_DSN: postgres://gofintracker:gofintracker@postgres:5432/users_db?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-local-env}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy

  transaction-service:
    build:
      context: .
      dockerfile: docker/transaction-service.Dockerfile
    container_name: gofintracker-transaction-service
    environment:
      TRANSACTION_SERVICE_GRPC_ADDR: :50052
      TRANSACTIONS_DATABASE_DSN: postgres://gofintracker:gofintracker@postgres:5432/transactions_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_TRANSACTION_CREATED_TOPIC: transaction.created
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  analytics-service:
    build:
      context: .
      dockerfile: docker/analytics-service.Dockerfile
    container_name: gofintracker-analytics-service
    environment:
      ANALYTICS_SERVICE_GRPC_ADDR: :50053
      ANALYTICS_DATABASE_DSN: postgres://gofintracker:gofintracker@postgres:5432/analytics_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_TRANSACTION_CREATED_TOPIC: transaction.created
      ANALYTICS_KAFKA_GROUP_ID: analytics-service
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "50053:50053"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  kafka:
    image: apache/kafka:3.7.1
    container_name: gofintracker-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  kafka-init:
    image: apache/kafka:3.7.1
    container_name: gofintracker-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:9092 \
          --create \
          --if-not-exists \
          --topic transaction.created \
          --partitions 1 \
          --replication-factor 1

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: gofintracker-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "${KAFKA_UI_PORT:-8081}:8080"

volumes:
  postgres_data:
  kafka_data:
