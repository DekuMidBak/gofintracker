syntax = "proto3";

package transaction.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/DekuMidBak/gofintracker/gen/go/transaction/v1;transactionv1";

service TransactionService {
  rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse);
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse);
  rpc CreateTransaction(CreateTransactionRequest) returns (CreateTransactionResponse);
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
}

enum TransactionType {
  TRANSACTION_TYPE_UNSPECIFIED = 0;
  TRANSACTION_TYPE_INCOME = 1;
  TRANSACTION_TYPE_EXPENSE = 2;
}

message Category {
  string id = 1;
  string user_id = 2;
  string name = 3;
  TransactionType type = 4;
  google.protobuf.Timestamp created_at = 5;
}

message Transaction {
  string id = 1;
  string user_id = 2;
  string category_id = 3;
  TransactionType type = 4;
  int64 amount = 5;
  string currency = 6;
  string description = 7;
  google.protobuf.Timestamp occurred_at = 8;
  google.protobuf.Timestamp created_at = 9;
}

message CreateCategoryRequest {
  string user_id = 1;
  string name = 2;
  TransactionType type = 3;
}

message CreateCategoryResponse {
  Category category = 1;
}

message ListCategoriesRequest {
  string user_id = 1;
  optional TransactionType type = 2;
}

message ListCategoriesResponse {
  repeated Category categories = 1;
}

message CreateTransactionRequest {
  string user_id = 1;
  string category_id = 2;
  TransactionType type = 3;
  int64 amount = 4;
  string currency = 5;
  string description = 6;
  google.protobuf.Timestamp occurred_at = 7;
}

message CreateTransactionResponse {
  Transaction transaction = 1;
}

message ListTransactionsRequest {
  string user_id = 1;
  optional google.protobuf.Timestamp from = 2;
  optional google.protobuf.Timestamp to = 3;
  optional string category_id = 4;
  optional TransactionType type = 5;
  int32 limit = 6;
  int32 offset = 7;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  int32 total_count = 2;
}

message GetBalanceRequest {
  string user_id = 1;
}

message GetBalanceResponse {
  repeated CurrencyBalance balances = 1;
}

message CurrencyBalance {
  string currency = 1;
  int64 income_amount = 2;
  int64 expense_amount = 3;
  int64 balance_amount = 4;
}
